<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPC Executive Map Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gpc: {
                            navy: '#0A192F', 
                            blue: '#1E40AF', 
                            green: '#65A30D', 
                            orange: '#EA580C', 
                            light: '#F8FAFC', 
                            border: '#E2E8F0' 
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    boxShadow: {
                        'elegant': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'floating': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .nav-item-active {
            background-color: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #EA580C;
        }
        /* Custom scrollbar for the nav menu */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1E40AF; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen w-screen overflow-hidden flex select-none font-sans antialiased">

    <aside class="w-80 bg-gpc-navy flex flex-col z-20 shadow-floating relative shrink-0">
        <div class="p-8 pb-4">
            <h1 class="text-2xl font-light tracking-tight text-white mb-1">GREAT PLAINS</h1>
            <h2 class="text-sm font-semibold tracking-widest text-gpc-orange uppercase">Communications [cite: 479]</h2>
            <div class="mt-4 w-8 h-1 bg-gpc-blue rounded-full"></div>
        </div>

        <nav class="flex-1 px-4 py-2 flex flex-col gap-1 overflow-y-auto" id="nav-menu">
            </nav>

        <div class="p-6 text-sm text-slate-400 font-light border-t border-slate-700/50">
            <div class="flex justify-between items-center">
                <span>Unified Reach</span>
                <span id="clock" class="text-slate-300 font-medium">00:00</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-gpc-light overflow-hidden">
        
        <header class="h-24 bg-white border-b border-gpc-border flex items-center justify-between px-10 z-10 shadow-sm shrink-0">
            <div>
                <h2 id="view-title" class="text-3xl font-bold text-slate-900 tracking-tight fade-in">Title</h2>
                <p id="view-subtitle" class="text-base text-slate-500 mt-1 fade-in">Subtitle</p>
            </div>
            <div id="stats-container" class="flex gap-8 fade-in">
                </div>
        </header>

        <section class="flex-1 relative overflow-hidden flex items-center justify-center p-8">
            <div id="map-visualizer" class="w-full h-full bg-white border border-gpc-border rounded-2xl flex flex-col items-center justify-center shadow-elegant relative fade-in overflow-hidden">
                <div class="text-center">
                    <h3 class="text-xl font-semibold text-slate-600 uppercase tracking-wide" id="placeholder-text">Load Asset</h3>
                </div>
            </div>

            <div class="absolute right-12 bottom-12 flex flex-col gap-3 z-10">
                <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-floating">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">View Controls</h4>
                    
                    <label class="flex items-center justify-between gap-6 mb-4 cursor-pointer group">
                        <span class="text-sm font-medium text-slate-700">Lit Fiber Networks</span>
                        <div class="relative">
                            <input type="checkbox" checked class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gpc-green shadow-inner"></div>
                        </div>
                    </label>

                    <label class="flex items-center justify-between gap-6 cursor-pointer group">
                        <span class="text-sm font-medium text-slate-700">Data Centers</span>
                        <div class="relative">
                            <input type="checkbox" checked class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gpc-blue shadow-inner"></div>
                        </div>
                    </label>
                </div>
            </div>
        </section>
    </main>

    <script>
        const mapData = {
            'national': {
                id: 'national',
                title: 'The Network [cite: 2]',
                subtitle: 'National Footprint & Coverages [cite: 4]',
                placeholder: 'National Map Active',
                stats: [
                    { label: 'Fiber Miles', value: '19,000+ [cite: 9]', color: 'text-gpc-green' },
                    { label: 'States Served', value: '13 [cite: 11]', color: 'text-slate-900' },
                    { label: 'Data Centers', value: '25+ [cite: 14]', color: 'text-gpc-blue' },
                    { label: 'Capacity', value: '400 Gbps [cite: 12]', color: 'text-gpc-orange' }
                ]
            },
            'layer2': {
                id: 'layer2',
                title: 'Layer 2 Core [cite: 119]',
                subtitle: 'High-Availability Network [cite: 120]',
                placeholder: 'Layer 2 Rings Active',
                stats: [
                    { label: 'Architecture', value: 'Redundant Ring [cite: 120]', color: 'text-gpc-green' },
                    { label: 'City-to-City', value: '200G/400G [cite: 120]', color: 'text-gpc-orange' }
                ]
            },
            'ip-network': {
                id: 'ip-network',
                title: 'IP Network & Peering',
                subtitle: 'Connected and Resilient IP Networks [cite: 543]',
                placeholder: 'Brochure IP Map Active',
                stats: [
                    { label: 'Connections', value: 'Tier-1 Providers ', color: 'text-gpc-blue' },
                    { label: 'Exchanges', value: 'Major IXs ', color: 'text-gpc-orange' }
                ]
            },
            'nebraska': {
                id: 'nebraska',
                title: 'Nebraska Market [cite: 200]',
                subtitle: 'Statewide Infrastructure Detail',
                placeholder: 'Nebraska Detail Active',
                stats: [
                    { label: 'State Fiber Miles', value: '10,000+ [cite: 201]', color: 'text-gpc-green' },
                    { label: 'Communities', value: '163 [cite: 202]', color: 'text-slate-900' }
                ]
            },
            'omaha-metro': {
                id: 'omaha-metro',
                title: 'Metro Areas [cite: 223]',
                subtitle: 'Omaha/Council Bluffs [cite: 223]',
                placeholder: 'Omaha Metro Active',
                stats: [
                    { label: 'Advantage', value: 'Unique Bypass Routes [cite: 204]', color: 'text-gpc-green' },
                    { label: 'Metro Miles', value: '500+ [cite: 203]', color: 'text-slate-900' }
                ]
            },
            'products': {
                id: 'products',
                title: 'Product Portfolio',
                subtitle: 'Fiber-Driven Services [cite: 450]',
                placeholder: 'Product List Active (SD-WAN, Voice, Cloud Connect, DDoS)',
                stats: [
                    { label: 'Core', value: 'Fiber Internet [cite: 456]', color: 'text-gpc-green' },
                    { label: 'Security', value: 'Managed Firewall [cite: 460]', color: 'text-gpc-orange' },
                    { label: 'Connectivity', value: 'Managed Ethernet [cite: 465]', color: 'text-gpc-blue' }
                ]
            },
            'why-gpc': {
                id: 'why-gpc',
                title: 'The GPC Advantage [cite: 5]',
                subtitle: 'Partner with Experience [cite: 486]',
                placeholder: 'Why Businesses Choose GPC Active',
                stats: [
                    { label: 'Experience', value: 'Over a Century [cite: 495]', color: 'text-slate-900' },
                    { label: 'Support', value: 'Unmatched Local [cite: 491]', color: 'text-gpc-blue' },
                    { label: 'Reliability', value: '24/7 Monitoring [cite: 493]', color: 'text-gpc-green' }
                ]
            },
            'case-studies': {
                id: 'case-studies',
                title: 'Client Success [cite: 273]',
                subtitle: 'Accelerate Business Performance [cite: 480]',
                placeholder: 'Aerospace & Hospitality Profiles Active',
                stats: [
                    { label: 'Delivery', value: 'Fast Turn-Up [cite: 286]', color: 'text-gpc-orange' },
                    { label: 'Connection', value: '100% Fiber [cite: 281]', color: 'text-gpc-green' }
                ]
            }
        };

        const navOrder = ['national', 'layer2', 'ip-network', 'nebraska', 'omaha-metro', 'products', 'why-gpc', 'case-studies'];
        
        function init() {
            buildNavigation();
            updateView('national');
            startClock();
        }

        function buildNavigation() {
            const navContainer = document.getElementById('nav-menu');
            navContainer.innerHTML = '';

            navOrder.forEach((key, index) => {
                const data = mapData[key];
                const btnNum = index + 1; 
                
                const btnHTML = `
                    <button id="nav-btn-${key}" onclick="updateView('${key}')" class="w-full text-left px-5 py-3 rounded-lg border-l-4 border-transparent hover:bg-white/5 transition-all group relative">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[9px] font-bold tracking-widest uppercase text-slate-400 group-hover:text-slate-300">Section 0${btnNum}</span>
                            <div class="w-5 h-5 rounded-full border border-slate-600 flex items-center justify-center text-[9px] text-slate-400 group-hover:border-slate-400 group-hover:text-slate-300 transition-colors">
                                ${btnNum}
                            </div>
                        </div>
                        <h3 class="text-sm font-medium text-slate-200 group-hover:text-white transition-colors truncate">${data.title.replace(/ \/g, '')}</h3>
                    </button>
                `;
                navContainer.insertAdjacentHTML('beforeend', btnHTML);
            });
        }

        function updateView(viewId) {
            const data = mapData[viewId];
            if (!data) return;

            navOrder.forEach(key => {
                document.getElementById(`nav-btn-${key}`).classList.remove('nav-item-active');
            });
            document.getElementById(`nav-btn-${viewId}`).classList.add('nav-item-active');

            const titleEl = document.getElementById('view-title');
            const subtitleEl = document.getElementById('view-subtitle');
            
            titleEl.classList.remove('fade-in');
            subtitleEl.classList.remove('fade-in');
            void titleEl.offsetWidth; 
            
            // Render text cleanly, without the citation tags in the main view
            titleEl.innerText = data.title.replace(/ \/g, '');
            subtitleEl.innerText = data.subtitle.replace(/ \/g, '');
            
            titleEl.classList.add('fade-in');
            subtitleEl.classList.add('fade-in');

            const statsContainer = document.getElementById('stats-container');
            statsContainer.innerHTML = '';
            data.stats.forEach(stat => {
                statsContainer.innerHTML += `
                    <div class="flex flex-col items-start border-l border-slate-200 pl-6">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">${stat.label.replace(/ \/g, '')}</span>
                        <span class="text-xl font-bold ${stat.color}">${stat.value.replace(/ \/g, '')}</span>
                    </div>
                `;
            });

            document.getElementById('placeholder-text').innerText = data.placeholder;
        }

        window.addEventListener('keydown', (e) => {
            const keyMap = { '1': 'national', '2': 'layer2', '3': 'ip-network', '4': 'nebraska', '5': 'omaha-metro', '6': 'products', '7': 'why-gpc', '8': 'case-studies' };
            if (keyMap[e.key]) updateView(keyMap[e.key]);
        });

        function startClock() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            }, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
