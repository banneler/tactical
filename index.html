<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPC Executive Map Display - Pro Complete</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gpc: {
                            navy: '#0A192F', blue: '#1E40AF', green: '#65A30D', orange: '#EA580C', light: '#F8FAFC', border: '#E2E8F0'
                        }
                    },
                    fontFamily: { 
                        sans: ['"Segoe UI"', '-apple-system', 'BlinkMacSystemFont', 'Roboto', 'sans-serif'] 
                    },
                    boxShadow: { 'floating': '0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1)' }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item-active { background-color: rgba(255, 255, 255, 0.1); border-left-color: #EA580C !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1E40AF; border-radius: 10px; }
        
        /* Keyboard Styles */
        .key { transition: all 0.1s; cursor: pointer; user-select: none; }
        .key:active { transform: scale(0.95); background-color: #CBD5E1; }
        
        /* Screensaver Animation */
        .ken-burns { animation: panZoom 30s infinite alternate linear; }
        @keyframes panZoom { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.1) translate(-2%, -2%); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen w-screen overflow-hidden flex select-none font-sans antialiased" oncontextmenu="return false;">

<div id="screensaver" class="fixed inset-0 z-50 bg-gpc-navy hidden flex-col items-center justify-center transition-opacity duration-1000 opacity-0 cursor-pointer">
        <div class="absolute inset-0 opacity-20 ken-burns" style="background-image: radial-gradient(circle at center, #1E40AF 0%, transparent 70%);"></div>
        
        <img src="GPC-White-1-1.webp" alt="Great Plains Communications" class="h-40 w-auto object-contain z-10 fade-in mb-16 drop-shadow-2xl">
        
        <div class="flex gap-24 z-10 fade-in" style="animation-delay: 0.4s;">
            <div class="text-center">
                <span class="block text-7xl font-bold text-gpc-green mb-4 drop-shadow-md">19,000+</span>
                <span class="text-slate-400 uppercase tracking-[0.2em] text-lg font-semibold">Fiber Miles [cite: 73, 12, 11]</span>
            </div>
            <div class="text-center">
                <span class="block text-7xl font-bold text-white mb-4 drop-shadow-md">100+</span>
                <span class="text-slate-400 uppercase tracking-[0.2em] text-lg font-semibold">Years Experience [cite: 495]</span>
            </div>
        </div>
        
        <p class="absolute bottom-20 text-slate-400 font-bold tracking-[0.3em] text-xl animate-pulse z-10">TOUCH SCREEN TO BEGIN</p>
    </div>

    <div id="admin-modal" class="fixed inset-0 z-40 bg-gpc-navy/90 backdrop-blur-md hidden items-center justify-center">
        <div class="bg-white rounded-2xl shadow-floating w-[800px] p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Configure Client Greeting</h2>
                <button onclick="closeAdmin()" class="text-slate-400 hover:text-red-500 font-bold text-xl">✕</button>
            </div>
            
            <input type="text" id="client-name-input" class="w-full text-4xl font-bold text-center text-gpc-blue border-b-2 border-slate-200 focus:border-gpc-orange outline-none bg-transparent mb-8 pb-2" placeholder="Enter Client Name..." readonly>
            
            <div class="flex flex-col gap-2 bg-slate-100 p-4 rounded-xl">
                <div class="flex justify-center gap-2" id="row-1"></div>
                <div class="flex justify-center gap-2" id="row-2"></div>
                <div class="flex justify-center gap-2" id="row-3"></div>
                <div class="flex justify-center gap-2 mt-2">
                    <div class="key bg-white shadow rounded-lg h-14 w-96 flex items-center justify-center font-bold text-slate-700 text-xl" onclick="typeKey(' ')">SPACE</div>
                </div>
            </div>

            <div class="flex justify-end gap-4 mt-8 border-t border-slate-100 pt-6">
                <button onclick="clearClient()" class="px-6 py-3 rounded-lg font-bold text-slate-500 hover:bg-slate-100 transition-colors">Clear Saved Data</button>
                <button onclick="saveClient()" class="px-8 py-3 rounded-lg font-bold text-white bg-gpc-orange hover:bg-orange-700 transition-colors shadow-lg">Save & Initialize</button>
            </div>
        </div>
    </div>

    <div class="p-8 pb-6 cursor-pointer" id="brand-trigger">
            <img src="GPC-White-1-1.webp" alt="GPC Logo" class="h-16 w-auto object-contain mb-6 drop-shadow-lg transition-transform hover:scale-105">
            <div class="w-12 h-1 bg-gpc-blue rounded-full"></div>
        </div>

        <nav class="flex-1 px-4 py-2 flex flex-col gap-2 overflow-y-auto" id="nav-menu"></nav>

        <div class="p-6 text-sm text-slate-400 border-t border-slate-700/50 flex justify-between items-center font-semibold">
            <span>GPC Enterprise</span>
            <span id="clock" class="text-slate-300">00:00</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-gpc-light overflow-hidden">
        
        <header class="h-24 bg-white border-b border-gpc-border flex items-center justify-between px-10 z-10 shadow-sm shrink-0">
            <div>
                <h2 id="view-title" class="text-3xl font-bold text-slate-900 tracking-tight fade-in">The Network</h2>
                <p id="view-subtitle" class="text-base text-slate-500 mt-1 fade-in font-medium">National Footprint & Coverages</p>
            </div>
            <div id="stats-container" class="flex gap-8 fade-in"></div>
        </header>

        <section class="flex-1 relative overflow-hidden flex items-center justify-center p-8">
            
            <div id="map-visualizer" class="w-full h-full bg-white border border-gpc-border rounded-2xl flex flex-col items-center justify-center shadow-elegant relative overflow-hidden">
                <div class="text-center z-0 pointer-events-none">
                    <svg class="w-20 h-20 text-slate-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                    <h3 class="text-xl font-semibold text-slate-600 uppercase tracking-wide" id="placeholder-text">Load Map Asset</h3>
                </div>

                <canvas id="whiteboard" class="absolute inset-0 w-full h-full z-10 cursor-crosshair hidden"></canvas>
            </div>

            <div class="absolute right-12 top-12 flex gap-3 z-20">
                <button id="btn-clear-draw" onclick="clearCanvas()" class="hidden px-4 py-2 bg-white text-slate-600 font-bold rounded-lg shadow-floating border border-slate-200 hover:text-red-500 text-sm transition-colors">Clear Ink</button>
                <button id="btn-toggle-draw" onclick="toggleDrawing()" class="px-4 py-2 bg-white text-gpc-blue font-bold rounded-lg shadow-floating border border-slate-200 flex items-center gap-2 text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    Enable Draw
                </button>
            </div>

            <div class="absolute right-12 bottom-12 flex flex-col gap-3 z-20">
                <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-floating">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">View Layers</h4>
                    <label class="flex items-center justify-between gap-6 mb-4 cursor-pointer group">
                        <span class="text-sm font-semibold text-slate-700">Lit Fiber Networks</span>
                        <div class="relative"><input type="checkbox" checked class="sr-only peer"><div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gpc-green"></div></div>
                    </label>
                    <label class="flex items-center justify-between gap-6 mb-4 cursor-pointer group">
                        <span class="text-sm font-semibold text-slate-700">400G Standard Routes</span>
                        <div class="relative"><input type="checkbox" checked class="sr-only peer"><div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gpc-orange"></div></div>
                    </label>
                    <label class="flex items-center justify-between gap-6 cursor-pointer group">
                        <span class="text-sm font-semibold text-slate-700">Data Centers & 5G Towers</span>
                        <div class="relative"><input type="checkbox" checked class="sr-only peer"><div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gpc-blue"></div></div>
                    </label>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- DATA & STATE ---
        let mapData = {
            'national': {
                id: 'national',
                title: 'The Network',
                subtitle: 'National Footprint & Coverages',
                placeholder: 'National Map Active',
                stats: [
                    { label: 'Fiber Miles', value: '19,000+', color: 'text-gpc-green' },
                    { label: 'States Served', value: '13', color: 'text-slate-900' },
                    { label: 'Data Centers', value: '25+', color: 'text-gpc-blue' },
                    { label: 'Capacity', value: '400 Gbps', color: 'text-gpc-orange' }
                ]
            },
            'layer2': {
                id: 'layer2',
                title: 'Layer 2 Core',
                subtitle: 'High-Availability Redundant Architecture',
                placeholder: 'Layer 2 Rings Active',
                stats: [
                    { label: 'Architecture', value: 'Redundant Ring', color: 'text-gpc-green' },
                    { label: 'City-to-City', value: '200G/400G', color: 'text-gpc-orange' },
                    { label: 'Scalability', value: '10/100/100G', color: 'text-slate-900' }
                ]
            },
            'ip-network': {
                id: 'ip-network',
                title: 'IP Network & Peering',
                subtitle: 'Connected and Resilient Cloud Access',
                placeholder: 'IP Network Map Active',
                stats: [
                    { label: 'Connections', value: 'Tier-1 Providers', color: 'text-gpc-blue' },
                    { label: 'Exchanges', value: 'Major IXs', color: 'text-gpc-orange' },
                    { label: 'Routing', value: 'Lowest-Latency', color: 'text-gpc-green' }
                ]
            },
            'nebraska': {
                id: 'nebraska',
                title: 'Nebraska Market',
                subtitle: 'Statewide Infrastructure Detail',
                placeholder: 'Nebraska Detail Active',
                stats: [
                    { label: 'State Fiber Miles', value: '10,000+', color: 'text-gpc-green' },
                    { label: 'Communities Served', value: '163', color: 'text-slate-900' },
                    { label: 'Omaha Metro', value: '500+ Miles', color: 'text-gpc-blue' }
                ]
            },
            'omaha-metro': {
                id: 'omaha-metro',
                title: 'Omaha / Council Bluffs',
                subtitle: 'Metro Area Street Level Routing',
                placeholder: 'Omaha Metro Active',
                stats: [
                    { label: 'Advantage', value: 'Unique Bypass Routes', color: 'text-gpc-green' },
                    { label: 'Key Data Center', value: '1623 Farnam', color: 'text-slate-900' }
                ]
            },
            'products': {
                id: 'products',
                title: 'Product Portfolio',
                subtitle: 'Fiber-Driven Enterprise Services',
                placeholder: 'Product List Active',
                stats: [
                    { label: 'Core', value: 'Fiber Internet', color: 'text-gpc-green' },
                    { label: 'Security', value: 'Managed Firewall', color: 'text-gpc-orange' },
                    { label: 'Network', value: 'SD-WAN', color: 'text-gpc-blue' },
                    { label: 'Performance', value: 'Cloud Connect', color: 'text-slate-900' }
                ]
            },
            'why-gpc': {
                id: 'why-gpc',
                title: 'The GPC Advantage',
                subtitle: 'Partner with Experience',
                placeholder: 'Why Businesses Choose GPC Active',
                stats: [
                    { label: 'Experience', value: '100+ Years', color: 'text-slate-900' },
                    { label: 'Support', value: 'Unmatched Local', color: 'text-gpc-blue' },
                    { label: 'Reliability', value: '24/7 Monitoring', color: 'text-gpc-green' }
                ]
            },
            'case-studies': {
                id: 'case-studies',
                title: 'Client Success',
                subtitle: 'Aerospace & Hospitality Profiles',
                placeholder: 'Case Studies Carousel Active',
                stats: [
                    { label: 'Delivery Timeline', value: 'Fast Turn-Up', color: 'text-gpc-orange' },
                    { label: 'Connection Type', value: '100% Fiber', color: 'text-gpc-green' }
                ]
            }
        };
        
        // Full 8-item navigation array
        let navOrder = ['national', 'layer2', 'ip-network', 'nebraska', 'omaha-metro', 'products', 'why-gpc', 'case-studies'];
        
        // --- INITIALIZATION ---
        function init() {
            checkClientGreeting();
            buildNavigation();
            updateView(navOrder[0]);
            startClock();
            setupScreensaver();
            setupCanvas();
            buildKeyboard();
            setupAdminTrigger();
        }

        // --- DYNAMIC CLIENT GREETING ---
        function checkClientGreeting() {
            const savedClient = localStorage.getItem('gpc-client');
            if (savedClient) {
                // Dynamically build the custom view
                mapData['guest'] = {
                    title: `Welcome, ${savedClient}`,
                    subtitle: 'Strategic Partnership Briefing',
                    placeholder: `Custom Presentation for ${savedClient} Active`,
                    stats: [
                        { label: 'Strategic Partner', value: savedClient, color: 'text-gpc-blue' },
                        { label: 'Network Base', value: '100% Fiber', color: 'text-gpc-green' }
                    ]
                };
                if (!navOrder.includes('guest')) navOrder.unshift('guest');
            } else {
                delete mapData['guest'];
                navOrder = navOrder.filter(id => id !== 'guest');
            }
        }

        // --- DOM MANIPULATION ---
        function buildNavigation() {
            const nav = document.getElementById('nav-menu');
            nav.innerHTML = '';
            navOrder.forEach((key, i) => {
                const btnNum = i + 1;
                const isGuest = key === 'guest';
                
                nav.innerHTML += `
                    <button id="nav-btn-${key}" onclick="updateView('${key}')" class="w-full text-left px-5 py-4 rounded-lg border-l-4 border-transparent hover:bg-white/5 transition-all group relative ${isGuest ? 'bg-white/5 border-l-gpc-blue' : ''}">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400 group-hover:text-slate-300">${isGuest ? 'CUSTOM BRIEFING' : `Section 0${btnNum}`}</span>
                            <div class="w-6 h-6 rounded-full border border-slate-600 flex items-center justify-center text-[10px] text-slate-400 group-hover:border-slate-400 group-hover:text-slate-300 font-semibold">${btnNum}</div>
                        </div>
                        <h3 class="text-base font-semibold text-slate-200 group-hover:text-white truncate ${isGuest ? 'text-gpc-orange' : ''}">${mapData[key].title}</h3>
                    </button>
                `;
            });
        }

        function updateView(viewId) {
            navOrder.forEach(key => document.getElementById(`nav-btn-${key}`).classList.remove('nav-item-active'));
            document.getElementById(`nav-btn-${viewId}`).classList.add('nav-item-active');

            const title = document.getElementById('view-title');
            const sub = document.getElementById('view-subtitle');
            title.classList.remove('fade-in'); sub.classList.remove('fade-in');
            void title.offsetWidth; // reflow
            
            // Render text
            title.innerText = mapData[viewId].title; 
            sub.innerText = mapData[viewId].subtitle;
            
            title.classList.add('fade-in'); sub.classList.add('fade-in');

            const stats = document.getElementById('stats-container');
            stats.innerHTML = '';
            mapData[viewId].stats.forEach(s => {
                stats.innerHTML += `<div class="flex flex-col items-start border-l border-slate-200 pl-6"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">${s.label}</span><span class="text-2xl font-bold ${s.color}">${s.value}</span></div>`;
            });
            document.getElementById('placeholder-text').innerText = mapData[viewId].placeholder;
        }

        // --- WHITEBOARD CANVAS (HTML5 API) ---
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, drawMode = false;

        function setupCanvas() {
            // Resize canvas to match the container
            const resize = () => {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#EA580C'; // GPC Orange Ink
            };
            window.addEventListener('resize', resize);
            resize();

            // Mouse & Touch Events
            const startPos = (e) => {
                isDrawing = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                const x = e.touches ? e.touches[0].clientX - rect.left : e.clientX - rect.left;
                const y = e.touches ? e.touches[0].clientY - rect.top : e.clientY - rect.top;
                ctx.moveTo(x, y);
            };
            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault(); // Stop scrolling while drawing
                const rect = canvas.getBoundingClientRect();
                const x = e.touches ? e.touches[0].clientX - rect.left : e.clientX - rect.left;
                const y = e.touches ? e.touches[0].clientY - rect.top : e.clientY - rect.top;
                ctx.lineTo(x, y);
                ctx.stroke();
            };
            const stopPos = () => { isDrawing = false; ctx.closePath(); };

            canvas.addEventListener('mousedown', startPos); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', stopPos); canvas.addEventListener('mouseout', stopPos);
            canvas.addEventListener('touchstart', startPos); canvas.addEventListener('touchmove', draw); canvas.addEventListener('touchend', stopPos);
        }

        function toggleDrawing() {
            drawMode = !drawMode;
            canvas.classList.toggle('hidden');
            document.getElementById('btn-clear-draw').classList.toggle('hidden');
            const btn = document.getElementById('btn-toggle-draw');
            if (drawMode) {
                btn.innerHTML = 'Disable Draw';
                btn.classList.replace('text-gpc-blue', 'text-slate-400');
            } else {
                btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> Enable Draw';
                btn.classList.replace('text-slate-400', 'text-gpc-blue');
            }
        }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- SCREENSAVER (ATTRACT MODE) ---
        let idleTime = 0;
        function setupScreensaver() {
            const ss = document.getElementById('screensaver');
            // Check every second
            setInterval(() => {
                idleTime++;
                if (idleTime > 60) { // 60 seconds
                    ss.classList.remove('hidden');
                    setTimeout(() => ss.classList.add('opacity-100'), 50);
                }
            }, 1000);

            // Reset timer on any interaction
            const resetTimer = () => {
                idleTime = 0;
                if (!ss.classList.contains('hidden')) {
                    ss.classList.remove('opacity-100');
                    setTimeout(() => ss.classList.add('hidden'), 1000);
                }
            };
            window.addEventListener('mousemove', resetTimer); window.addEventListener('keypress', resetTimer);
            window.addEventListener('touchstart', resetTimer); window.addEventListener('click', resetTimer);
        }

        // --- HIDDEN ADMIN & OSK ---
        let clickCount = 0;
        let clickTimer;
        function setupAdminTrigger() {
            document.getElementById('brand-trigger').addEventListener('click', () => {
                clickCount++;
                clearTimeout(clickTimer);
                if (clickCount >= 3) {
                    document.getElementById('admin-modal').classList.replace('hidden', 'flex');
                    document.getElementById('client-name-input').value = '';
                    clickCount = 0;
                }
                clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
            });
        }

        function closeAdmin() { document.getElementById('admin-modal').classList.replace('flex', 'hidden'); }

        function buildKeyboard() {
            const rows = [ ['Q','W','E','R','T','Y','U','I','O','P'], ['A','S','D','F','G','H','J','K','L'], ['Z','X','C','V','B','N','M', 'DEL'] ];
            rows.forEach((r, i) => {
                const target = document.getElementById(`row-${i+1}`);
                r.forEach(k => {
                    target.innerHTML += `<div class="key bg-white shadow rounded-lg h-14 w-14 flex items-center justify-center font-bold text-slate-700 text-xl" onclick="typeKey('${k}')">${k}</div>`;
                });
            });
        }

        function typeKey(k) {
            const input = document.getElementById('client-name-input');
            if (k === 'DEL') input.value = input.value.slice(0, -1);
            else input.value += k;
        }

        function saveClient() {
            const val = document.getElementById('client-name-input').value.trim();
            if (val) {
                localStorage.setItem('gpc-client', val);
                init(); // Rebuild with new data
                updateView('guest');
                closeAdmin();
            }
        }

        function clearClient() {
            localStorage.removeItem('gpc-client');
            init();
            closeAdmin();
        }

        // --- HARDWARE BUTTONS & UTILS ---
        window.addEventListener('keydown', (e) => {
            const num = parseInt(e.key);
            if (num > 0 && num <= navOrder.length) updateView(navOrder[num - 1]);
        });

        function startClock() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            }, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
