<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPC Executive Map Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gpc: {
                            navy: '#0A192F', // Deep corporate navy
                            blue: '#1E40AF', // Strong primary blue
                            green: '#65A30D', // Professional fiber green
                            orange: '#EA580C', // Refined 400G orange
                            light: '#F8FAFC', // Crisp background for maps
                            border: '#E2E8F0' // Soft border color
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    boxShadow: {
                        'elegant': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'floating': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Smooth, elegant transitions */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* Subtle selection styling */
        .nav-item-active {
            background-color: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #EA580C;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen w-screen overflow-hidden flex select-none font-sans antialiased">

    <aside class="w-80 bg-gpc-navy flex flex-col z-20 shadow-floating relative">
        <div class="p-8 pb-6">
            <h1 class="text-2xl font-light tracking-tight text-white mb-1">GREAT PLAINS</h1>
            <h2 class="text-sm font-semibold tracking-widest text-gpc-orange uppercase">Communications</h2>
            <div class="mt-6 w-8 h-1 bg-gpc-blue rounded-full"></div>
        </div>

        <nav class="flex-1 px-4 py-2 flex flex-col gap-2 overflow-y-auto" id="nav-menu">
            </nav>

        <div class="p-6 text-sm text-slate-400 font-light border-t border-slate-700/50">
            <div class="flex justify-between items-center">
                <span>Unified Reach Platform</span>
                <span id="clock" class="text-slate-300 font-medium">00:00</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-gpc-light">
        
        <header class="h-24 bg-white border-b border-gpc-border flex items-center justify-between px-10 z-10 shadow-sm">
            <div>
                <h2 id="view-title" class="text-3xl font-bold text-slate-900 tracking-tight fade-in">The Network</h2>
                <p id="view-subtitle" class="text-base text-slate-500 mt-1 fade-in">National Footprint & Coverages</p>
            </div>
            
            <div id="stats-container" class="flex gap-8 fade-in">
                </div>
        </header>

        <section class="flex-1 relative overflow-hidden flex items-center justify-center p-8">
            
            <div id="map-visualizer" class="w-full h-full bg-white border border-gpc-border rounded-2xl flex flex-col items-center justify-center shadow-elegant relative fade-in overflow-hidden">
                
                <div class="text-center">
                    <svg class="w-20 h-20 text-slate-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path>
                    </svg>
                    <h3 class="text-xl font-semibold text-slate-600 uppercase tracking-wide" id="placeholder-text">Load National SVG</h3>
                    <p class="text-slate-400 mt-2 text-sm">Waiting for map asset injection.</p>
                </div>
            </div>

            <div class="absolute right-12 bottom-12 flex flex-col gap-3 z-10">
                <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-floating">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">View Layers</h4>
                    
                    <label class="flex items-center justify-between gap-6 mb-4 cursor-pointer group">
                        <span class="text-sm font-medium text-slate-700">Lit Fiber Networks</span>
                        <div class="relative">
                            <input type="checkbox" checked class="sr-only peer" onchange="toggleLayer('lit')">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gpc-green shadow-inner"></div>
                        </div>
                    </label>

                    <label class="flex items-center justify-between gap-6 mb-4 cursor-pointer group">
                        <span class="text-sm font-medium text-slate-700">400G Standard Routes</span>
                        <div class="relative">
                            <input type="checkbox" checked class="sr-only peer" onchange="toggleLayer('400g')">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gpc-orange shadow-inner"></div>
                        </div>
                    </label>

                    <label class="flex items-center justify-between gap-6 cursor-pointer group">
                        <span class="text-sm font-medium text-slate-700">Data Centers & 5G Towers</span>
                        <div class="relative">
                            <input type="checkbox" checked class="sr-only peer" onchange="toggleLayer('facilities')">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gpc-blue shadow-inner"></div>
                        </div>
                    </label>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- ENTERPRISE DATA STRUCTURE ---
        const mapData = {
            'national': {
                id: 'national',
                title: 'The Network',
                subtitle: 'National Footprint & Coverages',
                placeholder: 'National Map Active',
                stats: [
                    { label: 'Fiber Miles', value: '19,000+', color: 'text-gpc-green' },
                    { label: 'States Served', value: '13', color: 'text-slate-900' },
                    { label: 'Data Centers', value: '25+', color: 'text-gpc-blue' },
                    { label: 'Standard Capacity', value: '400 Gbps', color: 'text-gpc-orange' }
                ]
            },
            'layer2': {
                id: 'layer2',
                title: 'Layer 2 Core',
                subtitle: 'High-Availability Redundant Architecture',
                placeholder: 'Layer 2 Rings Active',
                stats: [
                    { label: 'Architecture', value: 'Redundant Ring', color: 'text-gpc-green' },
                    { label: 'City-to-City', value: '200G/400G', color: 'text-gpc-orange' },
                    { label: 'Scalability', value: '10/100/100G', color: 'text-slate-900' }
                ]
            },
            'nebraska': {
                id: 'nebraska',
                title: 'Nebraska Market',
                subtitle: 'Statewide Infrastructure Detail',
                placeholder: 'Nebraska Detail Active',
                stats: [
                    { label: 'State Fiber Miles', value: '10,000+', color: 'text-gpc-green' },
                    { label: 'Communities Served', value: '163', color: 'text-slate-900' },
                    { label: 'Omaha Metro', value: '500+ Miles', color: 'text-gpc-blue' }
                ]
            },
            'omaha-metro': {
                id: 'omaha-metro',
                title: 'Omaha / Council Bluffs',
                subtitle: 'Metro Area Street Level Routing',
                placeholder: 'Omaha Metro Active',
                stats: [
                    { label: 'Advantage', value: 'Unique Bypass Routes', color: 'text-gpc-green' },
                    { label: 'Key Data Center', value: '1623 Farnam', color: 'text-slate-900' }
                ]
            },
            'case-studies': {
                id: 'case-studies',
                title: 'Client Success',
                subtitle: 'Aerospace & Hospitality Profiles',
                placeholder: 'Case Studies Carousel Active',
                stats: [
                    { label: 'Delivery Timeline', value: 'Fast Turn-Up', color: 'text-gpc-orange' },
                    { label: 'Connection Type', value: '100% Fiber', color: 'text-gpc-green' }
                ]
            }
        };

        const navOrder = ['national', 'layer2', 'nebraska', 'omaha-metro', 'case-studies'];
        let currentActive = 'national';

        // --- INITIALIZATION ---
        function init() {
            buildNavigation();
            updateView('national');
            startClock();
        }

        // --- DOM MANIPULATION ---
        function buildNavigation() {
            const navContainer = document.getElementById('nav-menu');
            navContainer.innerHTML = '';

            navOrder.forEach((key, index) => {
                const data = mapData[key];
                const btnNum = index + 1; 
                
                const btnHTML = `
                    <button id="nav-btn-${key}" onclick="updateView('${key}')" class="w-full text-left px-5 py-4 rounded-lg border-l-4 border-transparent hover:bg-white/5 transition-all group relative">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[10px] font-bold tracking-widest uppercase text-slate-400 group-hover:text-slate-300">Section 0${btnNum}</span>
                            <div class="w-6 h-6 rounded-full border border-slate-600 flex items-center justify-center text-[10px] text-slate-400 group-hover:border-slate-400 group-hover:text-slate-300 transition-colors">
                                ${btnNum}
                            </div>
                        </div>
                        <h3 class="text-base font-medium text-slate-200 group-hover:text-white transition-colors">${data.title}</h3>
                    </button>
                `;
                navContainer.insertAdjacentHTML('beforeend', btnHTML);
            });
        }

        function updateView(viewId) {
            const data = mapData[viewId];
            if (!data) return;

            // Reset UI states
            navOrder.forEach(key => {
                const btn = document.getElementById(`nav-btn-${key}`);
                btn.classList.remove('nav-item-active');
            });

            // Set Active State
            const activeBtn = document.getElementById(`nav-btn-${viewId}`);
            activeBtn.classList.add('nav-item-active');

            // Update Header (with fade animation reset)
            const titleEl = document.getElementById('view-title');
            const subtitleEl = document.getElementById('view-subtitle');
            
            titleEl.classList.remove('fade-in');
            subtitleEl.classList.remove('fade-in');
            void titleEl.offsetWidth; // trigger reflow
            
            titleEl.innerText = data.title;
            subtitleEl.innerText = data.subtitle;
            
            titleEl.classList.add('fade-in');
            subtitleEl.classList.add('fade-in');

            // Update Stats
            const statsContainer = document.getElementById('stats-container');
            statsContainer.innerHTML = '';
            data.stats.forEach(stat => {
                statsContainer.innerHTML += `
                    <div class="flex flex-col items-start border-l border-slate-200 pl-6">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">${stat.label}</span>
                        <span class="text-2xl font-bold ${stat.color}">${stat.value}</span>
                    </div>
                `;
            });

            // Update Visualizer Placeholder
            document.getElementById('placeholder-text').innerText = data.placeholder;
            
            currentActive = viewId;
        }

        function toggleLayer(layerName) {
            console.log(`Toggling layer: ${layerName}`);
            // Logic to toggle map layers here
        }

        // --- HARDWARE INTEGRATION (GPIO to Keyboard) ---
        window.addEventListener('keydown', (e) => {
            const keyMap = {
                '1': 'national',
                '2': 'layer2',
                '3': 'nebraska',
                '4': 'omaha-metro',
                '5': 'case-studies'
            };
            
            if (keyMap[e.key]) {
                updateView(keyMap[e.key]);
            }
        });

        // --- UTILS ---
        function startClock() {
            setInterval(() => {
                const now = new Date();
                const timeString = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                document.getElementById('clock').innerText = timeString;
            }, 1000);
        }

        // Run on load
        window.onload = init;
    </script>
</body>
</html>
